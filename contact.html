<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Z.E.D Web Solutions</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Z.E.D Web Solutions</h1>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <h2>Contact Us</h2>
        <form action="#" method="post">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>
            <label for="subject">Subject:</label>
            <input type="text" id="subject" name="subject" required>
            <label for="message">Message:</label>
            <textarea id="message" name="message" required></textarea>
            <button type="submit">Send</button>
        </form>
        <section class="contact-info">
            <h3>Contact Information</h3>
            <p>Address: 123 Z.E.D Street, Web City, WC 12345</p>
            <p>Phone: (123) 456-7890</p>
            <p>Email: info@zedwebsolutions.com</p>
        </section>
        <section class="map">
            <h3>Find Us Here</h3>
            <div id="map-placeholder" style="width: 100%; height: 300px; background: #e0e0e0;"></div>
            <p>(Placeholder for map integration)</p>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Z.E.D Web Solutions. All rights reserved.</p>
    </footer>
</body>
</html>
